# Reverse proxy: routes by Host header to the two parallel stacks.
#   fastapi.localhost -> Next.js (frontend-fastapi) + FastAPI (backend-fastapi)
#   django.localhost  -> Next.js (frontend-django)  + Django  (backend-django)
#
# Using variables + Docker's embedded DNS resolver (127.0.0.11) so nginx starts even if an
# upstream is briefly down, and re-resolves service names at request time.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ---- FastAPI stack -------------------------------------------------------
server {
    listen 80;
    server_name fastapi.localhost;
    resolver 127.0.0.11 valid=10s;

    # API + Swagger -> FastAPI
    location ~ ^/(api|docs|openapi\.json|redoc)(/|$) {
        set $backend http://backend-fastapi:8000;
        proxy_pass $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else -> Next.js (incl. HMR websocket)
    location / {
        set $frontend http://frontend-fastapi:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
    }
}

# ---- Django stack --------------------------------------------------------
server {
    listen 80;
    server_name django.localhost;
    resolver 127.0.0.11 valid=10s;

    # API + Swagger + admin -> Django
    location ~ ^/(api|docs|schema|admin|static)(/|$) {
        set $backend http://backend-django:8000;
        proxy_pass $backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $frontend http://frontend-django:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host       $host;
    }
}
